# === Server ===
server.port=8080

# === H2 In-Memory Database ===
# База создаётся автоматически в памяти при старте приложения и уничтожается при остановке.
# Не нужно ничего устанавливать или настраивать отдельно.
spring.datasource.url=jdbc:h2:mem:skybooking;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# === H2 Console (удобно смотреть данные в браузере) ===
# Доступна по адресу: http://localhost:8080/h2-console
# JDBC URL для входа в консоль: jdbc:h2:mem:skybooking
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# === Jackson ===
spring.jackson.serialization.write-dates-as-timestamps=false
